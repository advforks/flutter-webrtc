# Build libwebrtc for Windows ARM64 and publish libwebrtc-windows-arm64.zip to GitHub Releases.
name: Publish libwebrtc Windows ARM64

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.4.2)'
        required: true
        default: 'v1.4.2'
      create_release:
        description: 'Create release if missing'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-and-publish:
    name: Build and publish Windows ARM64 libwebrtc
    runs-on: windows-11-arm
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install depot_tools
        shell: pwsh
        run: |
          git clone --depth 1 https://chromium.googlesource.com/chromium/tools/depot_tools.git $env:RUNNER_TEMP\depot_tools
          echo "$env:RUNNER_TEMP\depot_tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cache WebRTC source
        uses: actions/cache@v4
        with:
          path: build/libwebrtc_src
          key: webrtc-m144-win-${{ runner.os }}-${{ runner.arch }}-v1

      - name: Sync WebRTC source
        shell: pwsh
        run: |
          $env:DEPOT_TOOLS_WIN_TOOLCHAIN = "0"
          third_party/scripts/setup_webrtc_gclient.ps1

      - name: Build libwebrtc (Windows ARM64)
        shell: cmd
        working-directory: build/libwebrtc_src/src
        run: |
          set DEPOT_TOOLS_WIN_TOOLCHAIN=0
          set GYP_MSVS_VERSION=2022
          gn gen out/Windows-arm64 --args="target_os=\"win\" target_cpu=\"arm64\" is_component_build=false is_clang=true is_debug=false rtc_use_h264=true ffmpeg_branding=\"Chrome\" rtc_include_tests=false rtc_build_examples=false libwebrtc_desktop_capture=true"
          ninja -C out/Windows-arm64 libwebrtc

      - name: Package libwebrtc-windows-arm64.zip
        shell: pwsh
        run: |
          third_party/scripts/package_libwebrtc_windows_arm64_zip.ps1 `
            -WindowsArm64BuildDir "build/libwebrtc_src/src/out/Windows-arm64"

      - name: Create or update GitHub release
        if: github.event.inputs.create_release != 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.release_tag }}"
          if (-not $tag) { $tag = "v1.4.2" }
          $exists = gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "Windows ARM64 libwebrtc prebuilt (m144). Asset: libwebrtc-windows-arm64.zip"
          }

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.release_tag }}"
          if (-not $tag) { $tag = "v1.4.2" }
          gh release upload $tag `
            third_party/downloads/libwebrtc-windows-arm64.zip `
            third_party/downloads/libwebrtc-windows-arm64.zip.shasum `
            --clobber
